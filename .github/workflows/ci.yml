name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Packaging audit
        run: npm run packaging:audit
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

